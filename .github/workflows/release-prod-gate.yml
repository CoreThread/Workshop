name: release-prod-gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release-prod-gate:
    name: release-prod-gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run production release gate
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Set-Location backend/scripts
          ./smoke_release_prod_gate.ps1 -ResultPath ../../artifacts/release_prod_gate_result.json | Tee-Object -FilePath ../../artifacts/release_prod_gate_output.txt

      - name: Upload release gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-prod-gate-output
          path: |
            artifacts/release_prod_gate_output.txt
            artifacts/release_prod_gate_result.json
